<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-6980894_1920.png" type="image/x-icon">

    <!-- tailwind & daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="bg-[#F8FAFC]">
    <header>
        <nav>
            <div class="navbar flex space-x-2 justify-between border border-[#E9E9E9] bg-white pr-[5%] pl-[5%]">
                <div class="flex justify-center items-center gap-1">
                    <img class="w-9" src="./assets/github-logo.png" alt="">
                    <p class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</p>
                </div>
                <div class="flex md:gap-4 gap-2">
                    <div class="flex items-center relative gap-2">

                        <button class="btn btn-circle md:hidden mx-auto">
                            <i class="fa-brands fa-sistrix "></i>
                        </button>

                        <button class="md:absolute md:left-2 md:block hidden text-[#64748B] z-10 "> <i
                                class="fa-brands fa-sistrix "></i></button>
                        <input type="text" placeholder="Search issues..."
                            class="input input-bordered border-[#E4E4E7] pl-8 w-24 md:w-auto hidden md:block focus:outline-none" />
                    </div>
                    <div>
                        <button class="btn btn-circle md:hidden mx-auto">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                        <button class="btn btn-primary hidden md:block"><i class="fa-solid fa-plus"></i> New
                            Issue</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="sm:w-[75%] mx-auto w-[94%] pb-15">
        <section id="button-section">
            <div class="flex  gap-2 bg-white p-6 shadow rounded-lg mb-4 mt-6 md:mt-15">
                <button onclick="switchTab('all'); loadIssue();" id="all"
                    class=" bg-[#4A00FF] text-white w-28 h-9 rounded font-semibold text-sm hover:shadow-md ">All</button>
                <button onclick="switchTab('open'); loadIssue(); " id="open"
                    class=" bg-white border border-[#E4E4E7] text-[gray] w-28 h-9 rounded font-medium text-sm  hover:shadow-md">Open</button>
                <button onclick="switchTab('closed'); loadIssue();" id="closed"
                    class=" bg-white border border-[#E4E4E7] text-[gray] w-28 h-9 rounded font-medium text-sm  hover:shadow-md">Closed</button>
            </div>
        </section>
        <section id="card-section" class="shadow  rounded-lg">
            <div class="flex justify-between gap-2 bg-white p-5.5 border-b border-[#E4E4E7] rounded-t-lg">
                <div class="flex gap-2">
                    <div class="w-[50px] h-[50px] rounded-full flex justify-center items-center bg-[#ECE4FF] shrink-0">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <p class="font-semibold text-xl text-[#1F2937]"><span>50</span> Issues</p>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="md:flex md:justify-center md:items-center justify-start gap-4 ">
                    <div class="flex justify-center items-center gap-2 font-medium text-[#1F2937]">
                        <div class="h-3 w-3 rounded-full bg-[#00A96E] "></div>
                        <p>Open</p>
                    </div>
                    <div class="flex justify-center items-center gap-2 font-medium text-[#1F2937]">
                        <div class="h-3 w-3 rounded-full bg-[#A855F7]"></div>
                        <p>Closed</p>
                    </div>
                </div>
            </div>
            <div id="card-container" class="bg-[#FBFBFB] p-6 rounded-b-lg grid grid-cols-4 gap-3 ">
                <!-- <div id="card" class=" bg-white border-t-3 border-[#00A96E] rounded shadow">

                    </div>

            </div>
        </section>
        <section id="modal">
            <!-- Open the modal using ID.showModal() method -->
            <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->

            <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
                <div class="modal-box">
                    <h3 class="text-lg font-bold">Hello!</h3>
                    <p class="py-4">Press ESC key or click the button below to close</p>
                    <div class="modal-action">
                        <form method="dialog">
                            <!-- if there is a button in form, it will close the modal -->
                            <button class="btn">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>
        </section>
    </main>

    <script src="./script/home.js"></script>
</body>
