<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-6980894_1920.png" type="image/x-icon">

    <!-- tailwind & daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="bg-[#F8FAFC]">
    <header>
        <nav>
            <div class="navbar flex space-x-2 justify-between border border-[#E9E9E9] bg-white pr-[5%] pl-[5%]">
                <div class="flex justify-center items-center gap-1">
                    <img class="w-9" src="./assets/github-logo.png" alt="">
                    <p class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</p>
                </div>
                <div class="flex md:gap-4 gap-2">
                    <div class="flex items-center relative gap-2">

                        <button class="btn btn-circle md:hidden mx-auto">
                            <i class="fa-brands fa-sistrix "></i>
                        </button>

                        <button class="md:absolute md:left-2 md:block hidden text-[#64748B] z-10 "> <i
                                class="fa-brands fa-sistrix "></i></button>
                        <input type="text" placeholder="Search issues..."
                            class="input input-bordered border-[#E4E4E7] pl-8 w-24 md:w-auto hidden md:block" />
                    </div>
                    <div>
                        <button class="btn btn-circle md:hidden mx-auto">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                        <button class="btn btn-primary hidden md:block"><i class="fa-solid fa-plus"></i> New Issue</button>
                    </div>
                </div>

            </div>
        </nav>
    </header>
    <main>
    </main>
</body>

</html>
