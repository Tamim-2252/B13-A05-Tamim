<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-6980894_1920.png" type="image/x-icon">

    <!-- tailwind & daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="bg-[#F8FAFC]">
    <form id="signinForm" class="flex justify-center items-center h-screen ml-4 mr-4">
        <fieldset class="fieldset w-sm  bg-white shadow-md rounded-lg sm:w-md p-8">
            <div class="text-center">
                <img class="mx-auto" src="./assets/github-logo.png" alt="">
                <p class="font-semibold text-2xl text-[#1F2937] pt-6">GitHub Issues Tracker</p>
                <p class="text-[#64748B] pb-6">Sign in to manage your issues</p>
            </div>

            <label class="font-medium text-[#1F2937]">Username</label>
            <input type="text" id="userName" class="input rounded-lg w-full" placeholder="Enter Username" />
            <p class="text-[#4A00FF] text-xs">Default: admin</p>

            <label class="font-medium text-[#1F2937] pt-4">Password</label>
            <input type="password" id="password" class="input rounded-lg w-full" placeholder="Enter Password" />
            <p class="text-[#4A00FF] text-xs">Default: admin123</p>

            <button class="btn btn-primary mb-4 mt-4">Sign In</button>

            <div class="flex justify-center items-center gap-2">
                <hr class="flex-1 border border-[#E4E4E7]">
                <span class="text-[#1F2937]">OR</span>
                <hr class="flex-1 border border-[#E4E4E7]">
            </div>
            <p class="text-center text-[#64748B] text-sm mt-4 mb-2">Demo Credentials:</p>
            <div class="rounded-lg bg-[#F8FAFC] text-[#1F2937] text-center p-4">
                <p><span class="font-semibold">Username: </span>admin</p>
                <p><span class="font-semibold">Password: </span>admin123</p>
            </div>
        </fieldset>
    </form>

    <script src="./script/login.js"></script>
</body>

</html>
